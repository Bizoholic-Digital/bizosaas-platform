  vault:
    image: hashicorp/vault:latest
    container_name: brain-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: staging-root-token-bizosaas-2025
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    networks:
      - dokploy-network
    cap_add:
      - IPC_LOCK
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

