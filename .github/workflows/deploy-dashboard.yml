name: Deploy Admin Dashboard

on:
  push:
    branches: [staging, main]
    paths:
      - 'portals/admin-dashboard/**'
      - 'shared/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/admin-dashboard
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: portals/admin-dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.bizoholic.net
            NEXT_PUBLIC_BRAIN_GATEWAY_URL=https://api.bizoholic.net
            NEXT_PUBLIC_GRAPHQL_URL=https://api.bizoholic.net/graphql
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ env.CLERK_SECRET_KEY }}
            NEXTAUTH_URL=https://admin.bizoholic.net
            NEXTAUTH_SECRET=${{ env.NEXTAUTH_SECRET }}
            SERVICE_PATH=portals/admin-dashboard

  notify-dokploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
    steps:
      - name: Trigger Dokploy Deployment (Frontend Stack)
        run: |
          echo "Triggering Frontend deployment on Dokploy..."
          curl -i -X POST "https://dk8.bizoholic.net/api/compose.deploy" \
            --retry 3 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "hU2yhYOqv3_ftKGGvcAiv"}'
